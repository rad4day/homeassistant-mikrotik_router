version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    target-branch: dev
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    target-branch: dev
    commit-message:
      prefix: "chore(ci):"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
